services:
  app:
    build: .
    container_name: app
    ports:
      - "8080:8080"
    environment:
      DB_USER: dev
      DB_PASSWORD: 1234
      DB_URL: jdbc:postgresql://db:5432/postgres
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: db